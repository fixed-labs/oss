name: release
run-name: release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.2.0'
        required: true

# Serialize releases; never cancel one mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # push the tag + create the GitHub Release in THIS repo

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        env:
          VER: ${{ inputs.version }}   # via env, never interpolated into the script — injection-safe
        run: |
          set -euo pipefail
          if ! printf '%s' "$VER" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be vX.Y.Z (got '$VER')"; exit 1
          fi

      - name: Require HOMEBREW_TAP_GITHUB_TOKEN
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN is not set. Mint a token with write access to fixed-labs/homebrew-tap and add it as an Actions secret on fixed-labs/oss."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # GoReleaser needs full history + the tag

      - name: Create and push tag
        env:
          VER: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "fixed-labs-bot"
          git config user.email "bot@fixed-labs.dev"
          # fetch-depth: 0 pulled all tags, so `git tag` fails locally if the version
          # already exists; the remote also rejects a duplicate tag. Either way an
          # already-released version dies here, before any build — releases are immutable.
          git tag -a "$VER" -m "rift $VER"
          git push origin "refs/tags/$VER"

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: 'v2.17.0'        # concrete pin: brews (formula) still ships here; see §1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
